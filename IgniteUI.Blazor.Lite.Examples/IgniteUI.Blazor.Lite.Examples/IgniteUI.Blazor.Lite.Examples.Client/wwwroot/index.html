<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IgniteUI Blazor Lite Examples</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="_content/IgniteUI.Blazor/themes/light/fluent.css" />

<body class="ig-typography">
    <div id="app">
        <div class="loading-screen">
            <svg class="loading-progress" viewBox="0 0 100 100">
                <circle class="loading-track" r="42" cx="50" cy="50" />

                    <circle class="loading-indicator" r="42" cx="50" cy="50" />
                </g>
            </svg>
            <div class="loading-progress-text">Loading</div>
        </div>
    </div>
